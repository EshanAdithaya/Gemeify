name: Sync Frontends and Build Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    env:
      GIT_NAME: eshangunathilaka
      GIT_EMAIL: eshangunathilaka@users.noreply.github.com
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      ADMIN_REPO: https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/eshangunathilaka/gemeify-admin.git
      CLIENT_REPO: https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/eshangunathilaka/gemeify-client.git
      BACKEND_IMAGE: registry.gitlab.com/eshangunathilaka/gemeify-client/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: paths
        uses: dorny/paths-filter@v2
        with:
          filters: |
            admin:
              - 'admin-dashboard/**'
            client:
              - 'client-dashboard/**'
            backend:
              - 'backend/**'

      - name: Sync admin-dashboard to GitLab repo
        if: steps.paths.outputs.admin == 'true'
        run: |
          rm -rf /tmp/admin
          mkdir -p /tmp/admin
          cd /tmp/admin
          git init .
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"
          git branch -M main
          rsync -a --exclude='.git' --delete "$GITHUB_WORKSPACE/admin-dashboard/" .
          git add -A
          git commit -m "CI sync admin-dashboard from upstream repo" || echo "No changes to commit"
          git remote add origin "$ADMIN_REPO" || true
          git push --force origin main || echo "Push failed"


      - name: Sync client-dashboard to GitLab repo
        if: steps.paths.outputs.client == 'true'
        run: |
          rm -rf /tmp/client
          mkdir -p /tmp/client
          cd /tmp/client
          git init .
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"
          git branch -M main
          rsync -a --exclude='.git' --delete "$GITHUB_WORKSPACE/client-dashboard/" .
          git add -A
          git commit -m "CI sync client-dashboard from upstream repo" || echo "No changes to commit"
          git remote add origin "$CLIENT_REPO" || true
          git push --force origin main || echo "Push failed"

      - name: Build and push backend container
        if: steps.paths.outputs.backend == 'true'
        env:
          DOCKER_BUILDKIT: 1
        run: |
          echo "$GITLAB_TOKEN" | docker login -u oauth2 --password-stdin registry.gitlab.com
          docker build -t "$BACKEND_IMAGE:latest" backend
          docker push "$BACKEND_IMAGE:latest"
